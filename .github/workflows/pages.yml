name: Build and deploy candidate vision

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize staged source
        if: github.actor != 'github-actions[bot]' && hashFiles('.staging/*.part*') != ''
        run: |
          cat .staging/index.html.part* > index.html
          cat .staging/styles.css.part* > styles.css
          cat .staging/resume.html.part* > resume.html
          cat .staging/cover-letter.html.part* > cover-letter.html
          cat .staging/interview-brief.html.part* > interview-brief.html
          cat .staging/120-day-plan.html.part* > 120-day-plan.html
          cat .staging/hard-objection.html.part* > hard-objection.html
          cat .staging/automation-assurance-review.html.part* > automation-assurance-review.html

      - name: Set up Python
        if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[no-build]')
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install campaign build dependencies
        if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[no-build]')
        run: |
          python -m pip install --upgrade pip
          pip install playwright pymupdf beautifulsoup4
          playwright install --with-deps chromium

      - name: Generate and verify PDFs
        if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[no-build]')
        run: |
          mkdir -p docs
          python scripts/build_pdfs.py
          python scripts/verify_campaign.py

      - name: Commit clean materialized campaign
        if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[no-build]')
        run: |
          rm -rf .staging .campaign-bootstrap
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'Materialize audited campaign assets and PDFs'
            git push origin main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful Pages deployment
        if: github.actor != 'github-actions[bot]' && success()
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          printf '{\n  "state": "deployed",\n  "source_sha": "%s",\n  "page_url": "%s",\n  "deployed_at": "%s"\n}\n' "$GITHUB_SHA" "$PAGE_URL" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > deployment-status.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add deployment-status.json
          if ! git diff --cached --quiet; then
            git commit -m 'Record successful Pages deployment [no-build]'
            git push origin main
          fi

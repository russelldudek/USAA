name: Build and deploy candidate vision

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        if: github.actor != 'github-actions[bot]'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PDF build dependencies
        if: github.actor != 'github-actions[bot]'
        run: |
          python -m pip install --upgrade pip
          pip install playwright pymupdf
          playwright install --with-deps chromium

      - name: Generate exact-page PDFs
        if: github.actor != 'github-actions[bot]'
        run: |
          rm -f docs/Russell-Dudek-USAA-Hard-Objection.pdf
          python scripts/build_pdfs.py

      - name: Commit generated PDFs
        if: github.actor != 'github-actions[bot]'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs
          if ! git diff --cached --quiet; then
            git commit -m 'Regenerate corrected campaign PDFs [no-build]'
            git push origin main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record successful deployment
        if: github.actor != 'github-actions[bot]' && success()
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          printf '{\n  "state": "deployed",\n  "source_sha": "%s",\n  "page_url": "%s",\n  "deployed_at": "%s"\n}\n' "$GITHUB_SHA" "$PAGE_URL" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > deployment-status.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add deployment-status.json
          if ! git diff --cached --quiet; then
            git commit -m 'Record corrected Pages deployment [no-build]'
            git push origin main
          fi
